name: EKS Secure Baseline Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  id-token: write   # Required for OIDC federation
  contents: read

env:
  TERRAFORM_ROOT: terraform
  ENVIRONMENT: prod
  AWS_REGION: eu-central-1

jobs:
  plan:
    name: Terraform Plan (PR Validation)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform CLI
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.x

      - name: Terraform Format Check
        run: terraform -chdir=${{ env.TERRAFORM_ROOT }} fmt -check -recursive

      - name: Terraform Init
        run: terraform -chdir=${{ env.TERRAFORM_ROOT }} init -input=false

      - name: Terraform Validate
        run: terraform -chdir=${{ env.TERRAFORM_ROOT }} validate

      - name: Static Security Scan (Checkov)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.TERRAFORM_ROOT }}
          framework: terraform
          soft_fail: false
          output_format: cli

      - name: Terraform Plan
        run: terraform -chdir=${{ env.TERRAFORM_ROOT }} plan -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: eks-secure-baseline-plan
          path: ${{ env.TERRAFORM_ROOT }}/tfplan


  apply:
    name: Terraform Apply (Production)
    needs: plan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform CLI
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.x

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Approved Plan
        uses: actions/download-artifact@v4
        with:
          name: eks-secure-baseline-plan
          path: ${{ env.TERRAFORM_ROOT }}

      - name: Terraform Init
        run: terraform -chdir=${{ env.TERRAFORM_ROOT }} init -input=false

      - name: Terraform Apply
        run: terraform -chdir=${{ env.TERRAFORM_ROOT }} apply -auto-approve tfplan
